# WattWatch Configuration
# YOLOv8-based intelligent occupancy detection

# Model settings
model:
  name: "yolov8n.pt"  # nano model for massive speedup
  confidence_threshold: 0.25
  person_class_id: 0

# Device settings
device:
  # Options: "cpu", "cuda", "mps", or null for auto-detect
  type: null

# Input/Output paths
paths:
  input_video: "data/test_clip.mp4"
  output_dir: "output"
  logs_dir: "logs"
  models_dir: "models"

# Detection settings
detection:
  # Process every N frames (1 = all frames, 2 = every other, etc.)
  frame_skip: 1
  # Minimum confidence for person detection
  min_confidence: 0.25

# Tracking settings
tracking:
  # Maximum distance (pixels) between centroids to match
  max_distance: 50.0
  # Frames to wait before removing lost track
  max_frames_to_skip: 5

# Logging settings
logging:
  fps_log_file: "logs/fps.log"
  detection_log_file: "output/detections.json"
  log_interval: 30  # Log FPS every N frames

# Video processing
video:
  # Number of frames to buffer
  buffer_size: 1
  # Timeout for reading frames (seconds)
  read_timeout: 5

# Testing clips
test_clips:
  occupied: "data/clips/occupied.mp4"
  empty: "data/clips/empty.mp4"
  quiet_reader: "data/clips/quiet-reader.mp4"

# Appliance detection settings
appliance:
  # Enable appliance status detection
  enabled: true
  # Process every N frames for appliance detection (less frequent than person detection)
  frame_skip: 20  # Reduced frequency to save CPU/Network
  # Real appliance wattage values (in watts)
  wattage:
    light: 40      # Actual LED bulb wattage
    ceiling_fan: 65 # Actual fan wattage
    monitor: 35     # Estimated monitor wattage
  # Electricity rate ($/kWh)
  electricity_rate: 0.12
  # Roboflow API settings
  roboflow:
    api_key: "p3oHA7T2HAO4pgy61Vae"
    light_model: "coms-room-light-63vyv/1"
    fan_model: "ceiling-fan-detection-epfsk/1"
    monitor_model: "monitor_detection-uj19t-zqnlq/1"
  # Use temp files for API inference
  use_temp_files: true

# Privacy / Anonymization settings
privacy:
  # Enable privacy-first ghost mode (face anonymization)
  enabled: true
  # Blur method: "gaussian" or "pixelate"
  blur_method: "pixelate"
  # Blur level: kernel size for gaussian
  blur_level: 99
  # Pixelate blocks: number of blocks (higher = more pixelated, more privacy)
  pixelate_blocks: 12
  # Face detection fallback: estimate from person bbox if no Haar cascade
  use_person_bbox_fallback: true
  # Performance: skip face detection every N frames
  skip_frames: 3
  # Storage settings
  storage:
    save_raw: false
    save_anonymized: false
    raw_dir: "data/raw"
    anonymized_dir: "data/anonymized"
    save_every_n_frames: 10

# Alert settings for waste detection
alerts:
  enabled: true
  initial_delay_seconds: 60    # 1 minutes before first alert
  repeat_interval_seconds: 600 # 10 minutes between follow-up alerts
  twilio:
    enabled: true
    account_sid: "AC9ee2cfc333ceea9617b6706deae49150"
    auth_token: "4e524d2f461ea5bc29a3d2cc42f4629c"
    from_number: "+14782802045"
    to_number: "+916290642933"
    whatsapp:
      enabled: true
      from_number: "whatsapp:+14155238886" # Twilio sandbox number
      content_sid: "HXb5b62575e6e4ff6129ad7c8efe1f983e"
  storage:
    enabled: true
    events_file: "output/waste_events.json"
    thumbnails_dir: "data/alerts"
    thumbnail_width: 320
  database:
    enabled: true
    db_path: "data/wattwatch.db"

# Microzone Intelligence settings
microzone:
  enabled: true
  rows: 4
  cols: 4
  # Heatmap decay (higher = longer trail)
  decay: 0.98
  # Potential energy savings from row-wise control (multiplier)
  energy_savings_factor: 0.25 # Each row can save up to 25% of its total load if empty
